site_name: ZarrParallelCacher
site_description: A tool to cache zarr data in parallel.
site_author: Daniel Westwood
plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: true
            show_object_full_path: true
            show_category_heading: true
            show_signature: true
            show_bases: true
            inherited_members: true
            members_order: alphabetical
            docstring_style: google
